      var cardAvatar = photo
        ? '<img src="' + photo + '" alt="' + name + '" style="width:48px;height:48px;border-radius:50%;object-fit:cover;display:block">'
        : '<div class="fgr-avatar" style="background:' + color + '">' + initial + '</div>';

      var modalAvatar = photo
        ? '<img src="' + photo + '" alt="' + name + '" style="width:52px;height:52px;border-radius:50%;object-fit:cover;display:block;flex-shrink:0">'
        : '<div class="fgr-modal-avatar" style="background:' + color + '">' + initial + '</div>';

      /* Carousel card */
      var card = document.createElement('div');
      card.className = 'fgr-card';
      card.innerHTML =
        '<div class="fgr-card-top">' +
          '<div class="fgr-avatar-wrap">' +
            cardAvatar +
            '<div class="fgr-verified">' + CHECK_SVG + '</div>' +
          '</div>' +
          '<div>' +
            '<div class="fgr-reviewer-name">' + name + '</div>' +
            '<div class="fgr-reviewer-source">' + AIRBNB_SVG + metaLine + '</div>' +
          '</div>' +
        '</div>' +
        '<div class="fgr-card-stars">' + CSTAR_SVG.repeat(5) + '</div>' +
        '<p class="fgr-card-text">' + text + '</p>' +
        '<button class="fgr-read-more" data-idx="' + i + '">Read more</button>';

      card.querySelector('.fgr-read-more').addEventListener('click', function () {
        fgrOpenModal(parseInt(this.getAttribute('data-idx')));
      });
      carousel.appendChild(card);

      /* Modal review row */
      var row = document.createElement('div');
      row.className = 'fgr-modal-review';
      row.id = 'fgrMR' + i;
      row.innerHTML =
        '<div class="fgr-modal-reviewer">' +
          modalAvatar +
          '<div class="fgr-modal-reviewer-info">' +
            '<div class="fgr-modal-reviewer-name-row">' + name + CHECK_SVG + '</div>' +
            '<div class="fgr-modal-reviewer-meta">' + AIRBNB_SVG + (kids ? '👨‍👩‍👧 Stayed with kids · ' : '') + meta + '</div>' +
            '<div style="font-size:11px;color:#aaa;margin-top:2px">' + date + '</div>' +
          '</div>' +
        '</div>' +
        '<div class="fgr-modal-review-stars">' + MSTAR_SVG.repeat(5) + '</div>' +
        '<p class="fgr-modal-review-text">' + text + '</p>';

      modalBody.appendChild(row);
    });
  }

  /* ── Fetch reviews from GitHub Pages ──────────── */
  fetch(REVIEWS_URL)
    .then(function (r) { return r.json(); })
    .then(function (data) { buildCards(data.reviews || []); })
    .catch(function () {
      /* fallback: build empty state */
      document.getElementById('fgrCarousel').innerHTML =
        '<p style="padding:20px;color:#888;font-size:13px">Reviews temporarily unavailable.</p>';
    });

  /* ── Carousel arrows ───────────────────────────── */
  var prev  = document.getElementById('fgrPrev');
  var next  = document.getElementById('fgrNext');
  var cardW = 280 + 16;

  function updateBtns() {
    prev.disabled = carousel.scrollLeft <= 4;
    next.disabled = carousel.scrollLeft >= carousel.scrollWidth - carousel.clientWidth - 4;
  }

  prev.addEventListener('click', function () { carousel.scrollBy({ left: -cardW * 2, behavior: 'smooth' }); });
  next.addEventListener('click', function () { carousel.scrollBy({ left:  cardW * 2, behavior: 'smooth' }); });
  carousel.addEventListener('scroll', updateBtns);
  updateBtns();

  /* ── Modal open/close ──────────────────────────── */
  var overlay = document.getElementById('fgrModalOverlay');

  window.fgrOpenModal = function (idx) {
    overlay.classList.add('is-open');
    document.body.style.overflow = 'hidden';
    // Scroll modal to the clicked review
    setTimeout(function () {
      var target = document.getElementById('fgrMR' + idx);
      if (target) target.scrollIntoView({ block: 'start' });
      else modalBody.scrollTop = 0;
    }, 50);
  };

  window.fgrCloseModal = function () {
    overlay.classList.remove('is-open');
    document.body.style.overflow = '';
  };

  // Close on overlay click
  overlay.addEventListener('click', function (e) {
    if (e.target === overlay) fgrCloseModal();
  });

  // Close on Escape
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') fgrCloseModal();
  });

})();
</script>
