name: Scrape Airbnb Reviews

on:
  schedule:
    # Runs every Monday at 03:00 UTC
    - cron: '0 3 * * 1'
  workflow_dispatch:   # also allows manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        working-directory: scraper
        run: npm ci

      - name: Install Chromium system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 \
            libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 \
            libxfixes3 libxrandr2 libgbm1 libasound2

      - name: Run scraper
        working-directory: scraper
        env:
          AIRBNB_LISTING_URL: https://www.airbnb.com/rooms/17517160
        run: node scrape.js

      - name: Commit updated reviews.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/reviews.json
          git diff --cached --quiet || git commit -m "chore: update reviews.json [$(date -u '+%Y-%m-%d')]"
          git push
